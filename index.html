<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuz Masalımız 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #fff9f6 0%, #fff0f2 50%, #f7e7e8 100%);
            color: #4a3e3d;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* IŞILDAYAN KALPLER */
        #heart-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .heart { 
            position: absolute; 
            color: #ffb3ba; 
            font-size: 20px; 
            animation: floatUp 7s linear infinite; 
            opacity: 0;
            text-shadow: 0 0 8px rgba(255, 179, 186, 0.6);
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg) scale(0.8); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { transform: translateY(-10vh) rotate(360deg scale(1.2); opacity: 0; }
        }

        /* GİRİŞ EKRANI */
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,249,246,0.98) 0%, rgba(255,240,242,0.98) 100%);
            z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.2s ease; padding: 20px;
            backdrop-filter: blur(10px);
        }
        #welcome-overlay h2 { 
            font-family: 'Alex Brush', cursive; 
            font-size: 5.5rem; 
            color: #cc8084; 
            margin-bottom: 30px;
            font-weight: 400;
        }

        .name-input {
            padding: 16px 30px; font-size: 1rem; font-weight: 300;
            border: 1px solid rgba(204, 128, 132, 0.3); background: rgba(255, 255, 255, 0.9); border-radius: 40px;
            margin-bottom: 30px; width: 100%; max-width: 320px; text-align: center; outline: none;
            letter-spacing: 1px; color: #614d4f;
            box-shadow: 0 10px 25px rgba(247, 214, 217, 0.2); transition: all 0.4s;
        }
        .name-input:focus { border-color: #cc8084; background: #ffffff; box-shadow: 0 10px 30px rgba(247, 214, 217, 0.4); }

        .enter-btn {
            padding: 16px 50px; font-size: 0.85rem; font-weight: 400; text-transform: uppercase; letter-spacing: 4px;
            background: linear-gradient(135deg, #e8a7a1 0%, #cc8084 100%); border: none; color: white;
            cursor: pointer; border-radius: 40px;
            box-shadow: 0 8px 25px rgba(204, 128, 132, 0.3); transition: all 0.4s ease;
        }
        .enter-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(204, 128, 132, 0.5); }

        /* MÜZİK KONTROLÜ */
        #music-control-btn {
            position: fixed; top: 25px; right: 25px; z-index: 999; 
            background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(247, 214, 217, 0.6); 
            width: 55px; height: 55px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.05); backdrop-filter: blur(8px); 
            font-size: 1.4rem; transition: all 0.4s ease;
        }
        .rotating { animation: spin 5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* HERO HEADER */
        header {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative;
            background: linear-gradient(rgba(255, 249, 246, 0.1), rgba(255, 249, 246, 0.9)), 
                        url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=1600') no-repeat center center/cover;
            padding: 20px; z-index: 2;
        }
        header h1 { font-family: 'Alex Brush', cursive; font-size: 8rem; color: #cc8084; margin-bottom: 15px; font-weight: 400; }
        header p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.25rem; color: #7a6365; letter-spacing: 2px; font-weight: 400; }

        /* MEKTUP */
        .love-letter-section { padding: 100px 20px; display: flex; justify-content: center; z-index: 2; position: relative; }
        .letter-box { 
            background: rgba(255, 255, 255, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            padding: 50px 40px; border-radius: 24px; max-width: 750px; text-align: center; 
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(247, 214, 217, 0.15); 
        }
        .letter-box p { font-family: 'Playfair Display', serif; font-size: 1.3rem; line-height: 1.9; color: #524142; font-style: italic; }

        /* SAYAÇ KUTULARI */
        .timer-section { padding: 100px 20px; text-align: center; position: relative; z-index: 2; }
        .timer-section h2 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400;
